version: '3.9'

# Development override - runs only infrastructure services
# Use this to run Postgres + Redis locally while developing services separately

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultdrop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vaultdrop
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultdrop-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data

volumes:
  postgres_data_dev:
  redis_data_dev:
